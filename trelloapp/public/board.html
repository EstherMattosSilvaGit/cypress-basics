<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board - Trello App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Back to Boards</a>
    <h1 id="boardTitle">Board</h1>
    <div class="board-content">
      <div class="column">
        <h3>To Do</h3>
        <div class="cards"></div>
        <button class="btn-add-card">+ Add a card</button>
      </div>
      <div class="column">
        <h3>In Progress</h3>
        <div class="cards"></div>
        <button class="btn-add-card">+ Add a card</button>
      </div>
      <div class="column">
        <h3>Done</h3>
        <div class="cards"></div>
        <button class="btn-add-card">+ Add a card</button>
      </div>
    </div>
  </div>

  <script src="board.js"></script>
</body>
</html>
